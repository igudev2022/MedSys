<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../static/media/logosem.png" type="image/x-icon">
    <link rel="stylesheet" href="../static/atu.css">
    <title>Atualizar dados</title>
</head>
<body>
    <header>
        <img src="../static/media/logosem.png" width="200">
    <h1>Atualizar Dados Pacientes</h1>
    <a href="{% url 'home' %}" class="cad" ><img src="../static/media/home.png" width="60px"></a>
    <a href=""><img src="../static/media/addmed.png" width="60px"></a>
    <a href=""><img src="../static/media/addreme.png" width="60px"></a>
</header>
    <form action="{% url 'update' %}" method="post">
        {% csrf_token %}
        <input type="text" name="id" value="{{pacientes.id}}" readonly><br>
        <label for="">Nome:</label>
        <input type="text" name="nome" value="{{pacientes.nome}}"><br>
        <label for="">Idade:</label>
        <input type="text" name="idade" value="{{pacientes.idade}}"><br>
        <label for="">Sexo:</label>
        <select id="sexo" name="sexo">
            <option value="Masculino" {% if paciente.sexo == "M" %}selected{% endif %}>Masculino</option>
            <option value="Feminino" {% if paciente.sexo == "F" %}selected{% endif %}>Feminino</option>
            <option value="Outro" {% if paciente.sexo == "O" %}selected{% endif %}>Outro</option>
        </select>
        <label for="">Endereço:</label>
        <input type="text" name="endereco" value="{{pacientes.endereco}}"><br>
        <label for="">Cpf:</label>
        <input type="text" name="cpf" value="{{pacientes.cpf}}"><br>
        <input type="submit" value="Atualizar">
    </form>
</body>
</html>
