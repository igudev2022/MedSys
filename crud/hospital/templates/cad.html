<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../static/media/logosem.png" type="image/x-icon">
    <link rel="stylesheet" href="../static/cadpac.css">
    <title>Cadastrar Pacientes</title>
</head>
<body>
    <header>
       
            <img src="../static/media/logosem.png" width="200">
       
        <h1>Cadastro de Pacientes</h1>
        <a href="{% url 'home' %}" class="cad" ><img src="../static/media/home.png" width="60px"></a>
        <a href=""><img src="../static/media/addmed.png" width="60px"></a>
        <a href=""><img src="../static/media/addreme.png" width="60px"></a>
    </header>
    <div>
    <form action="{% url 'salvar' %}" method="post">
        {% csrf_token %}    
        <label for="">Nome:</label>
        <input type="text" name="nome">
        <label for="">Idade:</label>
        <input type="text" name="idade">
        <label for="">Sexo:</label>
        <select name="sexo" id="sexo">
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
            <option value="Outro">Outro</option>
        </select>
        <label for="">Endereço:</label>
        <input type="text" name="endereco">
        <label for="">Cpf:</label>
        <input type="text" name="cpf">
        <input type="submit" value="Cadastrar">
    </form>

</div>
</body>
</html>
